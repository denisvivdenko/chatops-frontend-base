name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: chatops-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          docker tag chatops-frontend:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/chatops-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/chatops-frontend:${{ github.sha }}
